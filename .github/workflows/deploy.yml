name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      
      - name: Install dependencies
        run: uv sync --no-dev
      
      - name: Prepare deployment
        run: |
          # Create _site directories
          mkdir -p ./_site/app/static ./_site/docs

          # Publish workshop docs under /docs instead of the site root
          cp -r docs/* ./_site/docs/

          # Copy static assets
          cp -r app/static/* ./_site/app/static/

          # Render the start screen as the site root for GitHub Pages
          uv run python <<'PY'
          from jinja2 import Environment, FileSystemLoader
          from app.game_service import GameSession
          from app.models import GameState

          env = Environment(loader=FileSystemLoader('app/templates'))
          session = GameSession()

          template = env.get_template('home.html')
          full_html = template.render(
              session=session,
              GameState=GameState,
              static_mode=True,
              url_for=lambda name, path='': f'app/static/{path}' if name == 'static' else path,
          )

          with open('_site/index.html', 'w') as f:
              f.write(full_html)
          PY
          
          # Prevent Jekyll processing
          touch ./_site/.nojekyll
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
