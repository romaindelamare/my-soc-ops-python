<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
    <div class="bg-surface border border-gray-200 p-6 max-w-xs w-full text-center slide-up">
        <h2 class="text-display font-extrabold uppercase tracking-widest text-accent mb-2">Bingo</h2>
        <p class="text-muted text-xs uppercase tracking-widest mb-6">Line complete</p>

        <button
            hx-post="/dismiss-modal"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="w-full bg-accent text-dark font-bold py-3 px-6 text-sm uppercase tracking-widest active:bg-accent-light transition-colors">
            Keep Playing
        </button>
    </div>
</div>
