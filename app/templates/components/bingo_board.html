<div class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square font-grid">
    {% for square in session.board %}
    {% set is_winning = square.id in session.winning_square_ids %}
    <button
        {% if not square.is_free_space %}
        hx-post="/toggle/{{ square.id }}"
        hx-target="#game-container"
        hx-swap="outerHTML"
        {% endif %}
        {% if square.is_free_space %}disabled{% endif %}
        class="flex items-center justify-center p-1 text-center border border-gray-300 transition-all duration-150 select-none min-h-[60px] text-xs leading-tight
        {%- if square.is_marked %}
            {%- if is_winning %} bg-marked border-marked-border text-dark font-bold
            {%- else %} bg-marked border-marked-border text-dark
            {%- endif %}
        {%- elif square.is_free_space %} bg-surface text-muted
        {%- else %} bg-surface text-gray-700 active:bg-gray-100
        {%- endif %}"
        aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
        aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
        <span class="wrap-break-word hyphens-auto">{{ square.text }}</span>
    </button>
    {% endfor %}
</div>
