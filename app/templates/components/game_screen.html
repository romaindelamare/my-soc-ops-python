<div id="game-container">
<div class="flex flex-col min-h-full bg-gray-50">
    <!-- Header -->
    <header class="flex items-center justify-between p-3 border-b border-gray-200">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="text-gray-700 text-xs px-3 py-1.5 uppercase tracking-wide active:bg-gray-100 transition-colors">
            &larr; Back
        </button>
        <h1 class="font-extrabold uppercase tracking-widest text-sm">Soc Ops</h1>
        <div class="w-16"></div>
    </header>

    <!-- Bingo indicator -->
    {% if session.has_bingo %}
    <div class="text-accent text-center py-2 font-bold text-xs uppercase tracking-widest border-b border-gray-200">
        Bingo &mdash; Line complete
    </div>
    {% endif %}

    <!-- Board -->
    <div class="flex-1 flex items-center justify-center p-3">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
